kind = "web"
previewPath = "/"
title = "DeakinPay Website"
version = "1.0.0"
id = "artifacts/deakinpay-website"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18974

[services.development]
run = "pnpm --filter @workspace/deakinpay-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/deakinpay-website", "run", "build" ]
serve = "static"
publicDir = "artifacts/deakinpay-website/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18974"
BASE_PATH = "/"
